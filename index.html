<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel de Atendimentos (dados.csv)</title>
  <meta name="color-scheme" content="dark light" />
  <base href="./" />
  <style>
    :root{
      --bg0:#070A12; --bg1:#0B1222; --card: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.12); --text:#EAF0FF; --muted: rgba(234,240,255,.72);
      --good:#5CFFB0; --med:#FFB020; --bad:#FF2D55; 
      --accent:#7C5CFF; --accent2:#22D3EE;
      --shadow: 0 20px 60px rgba(0,0,0,.55); --radius: 18px; --radius2: 12px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;background:
        radial-gradient(1200px 700px at 10% 10%, rgba(124,92,255,.25), transparent 55%),
        radial-gradient(900px 600px at 90% 20%, rgba(34,211,238,.18), transparent 55%),
        radial-gradient(800px 600px at 40% 90%, rgba(92,255,176,.12), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      font-family:var(--sans); color:var(--text);
      overflow-x:hidden;
    }
    .wrap{display:flex;flex-direction:column;min-height:100vh;margin:0 auto; max-width:1500px; padding:0 24px;}
    header{padding:40px 0 22px;text-align:center;}
    h1{
      font-size:3.2rem; font-weight:750; margin:0 0 10px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; letter-spacing:-0.02em;
    }
    .subtitle{font-size:1.05rem; color:var(--muted); font-weight:450;}

    .controls{
      display:flex; flex-wrap:wrap; gap:16px; margin:26px 0 10px;
      align-items:end; justify-content:center;
    }
    .control-group{display:flex; flex-direction:column; gap:8px; min-width:210px;}
    .control-group label{font-size:0.82rem; color:var(--muted); font-weight:600; letter-spacing:0.5px; text-transform:uppercase;}
    select, input{
      padding:12px 14px; border:1px solid var(--stroke); border-radius:var(--radius2);
      background:var(--card); color:var(--text); font-size:1rem; outline:none;
      transition:all 0.2s ease; backdrop-filter:blur(10px);
    }
    input::placeholder{color:rgba(234,240,255,.35)}
    select:focus, input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,92,255,0.12);}

    .tabs{
      display:flex; gap:3px; margin:20px 0 25px;
      background:rgba(255,255,255,0.04); border-radius:var(--radius);
      padding:6px; backdrop-filter:blur(15px);
    }
    .tabs button{
      flex:1; padding:14px 18px; border:none; border-radius:var(--radius2);
      background:transparent; color:var(--muted); cursor:pointer;
      font-size:0.95rem; font-weight:600; transition:all 0.25s ease;
      min-width:130px; white-space:nowrap;
    }
    .tabs button.active{
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      color:#fff; box-shadow:var(--shadow); transform:translateY(-1px);
    }
    .tabs button:hover:not(.active){background:rgba(255,255,255,0.08); color:var(--text);}

    .tab-content{display:none;}
    .tab-content.active{display:block;}
    .table-wrap{
      background:var(--card); border-radius:var(--radius); overflow:hidden;
      border:1px solid var(--stroke); backdrop-filter:blur(20px);
      box-shadow:var(--shadow);
    }
    table{width:100%; border-collapse:collapse;}
    thead{background:rgba(255,255,255,0.08);}
    thead th{
      padding:16px 14px; font-size:0.88rem; color:var(--muted);
      font-weight:700; text-transform:uppercase; letter-spacing:0.8px;
      text-align:left; border-bottom:1px solid var(--stroke);
    }
    thead th.sortable{
      cursor:pointer; user-select:none; transition:all 0.2s ease;
    }
    thead th.sortable:hover{
      color: var(--text); background:rgba(255,255,255,0.08);
    }
    thead th .sort-ind{
      margin-left:6px; opacity:.85; font-size:.9em; color:var(--accent2);
    }
    tbody td{padding:12px 14px; border-bottom:1px solid rgba(255,255,255,0.05); vertical-align:middle; white-space:nowrap;}
    tbody tr:hover{background:rgba(255,255,255,0.03);}
    tbody tr:last-child td{border-bottom:none;}
    .rank-col{font-family:var(--mono); font-weight:900; width:76px;}
    .num{font-family:var(--mono); text-align:right;}
    .name{font-weight:800; max-width:420px; overflow:hidden; text-overflow:ellipsis;}
    .badge{
      display:inline-block; padding:2px 8px; border:1px solid rgba(255,255,255,.14);
      border-radius:999px; font-size:.78rem; color:var(--muted); font-family:var(--mono); margin-left:8px;
    }
    .pill{
      display:inline-flex; align-items:center; justify-content:center;
      min-width:86px; padding:4px 10px; border-radius:999px; font-family:var(--mono);
      font-weight:900; border:1px solid rgba(255,255,255,.14);
    }
    .p-bad{background:rgba(255,45,85,.12); color:var(--bad); border-color:rgba(255,45,85,.28);}
    .p-med{background:rgba(255,176,32,.12); color:var(--med); border-color:rgba(255,176,32,.28);}
    .p-good{background:rgba(92,255,176,.12); color:var(--good); border-color:rgba(92,255,176,.28);}

    .note{
      padding:14px 16px; border:1px solid var(--stroke); border-radius:var(--radius2);
      background:rgba(255,255,255,0.03); color:var(--muted); font-size:0.92rem;
      margin:20px 0;
    }
    .note.warn{
      background:rgba(255,176,32,0.08); border-color:rgba(255,176,32,0.25); color:var(--med);
    }
    .note strong{color:var(--text);}

    .kpi-grid{
      display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
      gap:16px; margin:20px 0;
    }
    .kpi-card{
      background:var(--card); border:1px solid var(--stroke); border-radius:var(--radius2);
      padding:18px; text-align:center; backdrop-filter:blur(15px);
    }
    .kpi-value{
      font-size:2.2rem; font-weight:900; font-family:var(--mono);
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .kpi-label{font-size:0.85rem; color:var(--muted); margin-top:4px; font-weight:600;}

    .cancel-link{
      color:var(--accent2); text-decoration:none; font-weight:900;
      transition:all 0.2s ease;
    }
    .cancel-link:hover{
      color:var(--accent); transform:scale(1.1);
    }

    @media (max-width:768px){
      .wrap{padding:0 16px;}
      h1{font-size:2.4rem;}
      .controls{flex-direction:column; align-items:stretch;}
      .control-group{min-width:auto;}
      .tabs{flex-wrap:wrap;}
      .tabs button{min-width:auto; flex:none;}
      .hide-sm{display:none;}
      .table-wrap{overflow-x:auto;}
      table{min-width:600px;}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Painel de Atendimentos</h1>
      <p class="subtitle">Fonte: <strong>dados.csv</strong> (VGV = soma simples da coluna G)</p>
    </header>

    <div class="controls">
      <div class="control-group">
        <label>Período</label>
        <select id="periodo">
          <option value="">Todos os períodos</option>
        </select>
      </div>
      <div class="control-group">
        <label>UF</label>
        <select id="uf">
          <option value="">Todas as UFs</option>
        </select>
      </div>
      <div class="control-group">
        <label>Status</label>
        <select id="statusFilter">
          <option value="">Todos os status</option>
          <option value="vendido">Vendido</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>
      <div class="control-group">
        <label>Tipo (Profissionais)</label>
        <select id="profTipo">
          <option value="promotor">Promotor</option>
          <option value="liner">Liner</option>
          <option value="closer">Closer</option>
        </select>
      </div>
      <div class="control-group">
        <label>Buscar Profissional</label>
        <input type="text" id="profSearch" placeholder="Digite o nome..." />
      </div>
    </div>

    <div class="tabs">
      <button id="tab-overview" class="active">Visão Geral</button>
      <button id="tab-ranking-promotor">Ranking Promotor</button>
      <button id="tab-ranking-liner">Ranking Liner</button>
      <button id="tab-ranking-closer">Ranking Closer</button>
      <button id="tab-profissionais">Profissionais</button>
      <button id="tab-perfil-renda">Perfil de Renda</button>
    </div>

    <div id="content">
      <div id="overview" class="tab-content active">
        <div id="kpis-gerais"></div>
      </div>

      <div id="ranking-promotor" class="tab-content"></div>
      <div id="ranking-liner" class="tab-content"></div>
      <div id="ranking-closer" class="tab-content"></div>

      <div id="profissionais" class="tab-content">
        <div id="profissionais-table"></div>
        <div id="cancelamentos-detalhe" style="margin-top:12px"></div>
      </div>

      <div id="perfil-renda" class="tab-content">
        <div id="perfil-renda-single"></div>
      </div>
    </div>
  </div>

<script>
const CSV_URL = new URL("dados.csv", document.baseURI).toString();
const el = (id) => document.getElementById(id);
const state = { rows: [], filtered: [], meta: { vgvColKey: null, firstColKey: null } };

// Sistema de ordenação por tabela
const sortState = {
  "ranking-promotor": { key: "vendas", dir: "desc" },
  "ranking-liner": { key: "vendas", dir: "desc" },
  "ranking-closer": { key: "vendas", dir: "desc" },
  "profissionais-table": { key: "vendas", dir: "desc" },
  "perfil-renda-single": { key: "vgvTotal", dir: "desc" },
};

function compareValues(a, b, key, dir = "desc") {
  const va = a?.[key]; const vb = b?.[key];
  const aNull = va == null; const bNull = vb == null;
  if (aNull && bNull) return 0;
  if (aNull) return 1; if (bNull) return -1;
  if (typeof va === "number" && typeof vb === "number") {
    return dir==="asc"?(va - vb):(vb - va);
  }
  const sa = String(va); const sb = String(vb);
  const cmp = sa.localeCompare(sb, "pt-BR", {sensitivity: "base"});
  return dir==="asc"?cmp:-cmp;
}

function sortedList(list, tableId, defaultKey="vendas") {
  const s = sortState[tableId] || { key: defaultKey, dir: "desc" };
  const key = s.key || defaultKey; const dir = s.dir || "desc";
  const arr = list.slice();
  arr.sort((a,b) => {
    const main = compareValues(a,b,key,dir);
    if (main !== 0) return main;
    const t1 = compareValues(a,b,"vgvTotal","desc");
    if (t1 !== 0) return t1;
    const t2 = compareValues(a,b,"vendas","desc");
    if (t2 !== 0) return t2;
    if ("name" in a && "name" in b) return compareValues(a,b,"name","asc");
    if ("faixa" in a && "faixa" in b) return compareValues(a,b,"faixa","asc");
    return 0;
  });
  return arr;
}

function setSort(tableId, key) {
  const cur = sortState[tableId] || { key, dir: "desc" };
  if (cur.key===key){
    cur.dir = (cur.dir==="desc")?"asc":"desc";
  }else{
    cur.key=key; cur.dir="desc";
  }
  sortState[tableId]=cur;
}

function sortIndicator(tableId, key) {
  const s = sortState[tableId];
  if (!s || s.key !== key) return '<span class="sort-ind">⇅</span>';
  return `<span class="sort-ind">${s.dir==="desc"?"▼":"▲"}</span>`;
}

// Auto-detect para colunas de clientes
function guessClientKeys() {
  if (!state.rows.length) return { k1: null, k2: null };
  const keys = Object.keys(state.rows[0]);
  const k1 = keys.find(k => {
    const kn = k.toLowerCase();
    return kn.includes("cliente 1") || kn.includes("nome cliente 1") || 
           kn.includes("titular") || kn.includes("responsavel 1") || 
           kn.includes("responsável 1") || kn.includes("nome 1");
  });
  const k2 = keys.find(k => {
    const kn = k.toLowerCase();
    return kn.includes("cliente 2") || kn.includes("nome cliente 2") || 
           kn.includes("conjuge") || kn.includes("cônjuge") || 
           kn.includes("responsavel 2") || kn.includes("responsável 2") ||
           kn.includes("nome 2");
  });
  return { k1: k1 || null, k2: k2 || null };
}

function getClientNames(row) {
  const { k1, k2 } = guessClientKeys();
  const c1 = k1 ? (row[k1] ?? "").toString().trim() : "";
  const c2 = k2 ? (row[k2] ?? "").toString().trim() : "";
  return {
    cliente1: c1 || "(cliente 1 não encontrado)",
    cliente2: c2 || "(cliente 2 não encontrado)",
  };
}

function rowHasCancelQuota(row) {
  return (row?._quotas?.cancelado ?? 0) > 0;
}

function clearCancelDetail() {
  const box = el("cancelamentos-detalhe");
  if (box) box.innerHTML = "";
}

function renderCancelDetailForProfessional(tipoKeyNorm, nome) {
  const box = el("cancelamentos-detalhe");
  if (!box) return;

  const mine = state.filtered
    .filter(r => norm(r[tipoKeyNorm] ?? "") === norm(nome))
    .filter(rowHasCancelQuota);

  if (!mine.length) {
    box.innerHTML = `
      <div class="note">Nenhuma linha com cota <strong>CANCELADA</strong> encontrada para <strong>${nome}</strong> nos filtros atuais.</div>
    `;
    return;
  }

  box.innerHTML = `
    <div class="note warn">
      <strong>Cancelamentos de ${nome}</strong> — ${mine.length} casal(is) com pelo menos 1 cota CANCELADA.
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Cliente 1</th>
            <th>Cliente 2</th>
            <th class="num">VGV</th>
            <th>Promotor</th>
            <th>Liner</th>
            <th>Closer</th>
            <th class="num">Cotas Canceladas</th>
            <th class="num">Cotas Totais</th>
          </tr>
        </thead>
        <tbody>
          ${mine.map(r => {
            const { cliente1, cliente2 } = getClientNames(r);
            const prom = (r[KEY.promotor] ?? "").toString().trim();
            const lin  = (r[KEY.liner] ?? "").toString().trim();
            const clo  = (r[KEY.closer] ?? "").toString().trim();
            const vgv  = r._valorVgv ?? 0;
            const qc   = r._quotas?.cancelado ?? 0;
            const qt   = r._quotas?.total ?? 0;

            return `
              <tr>
                <td class="name" title="${cliente1}">${cliente1}</td>
                <td class="name" title="${cliente2}">${cliente2}</td>
                <td class="num">${fmtMoney(vgv)}</td>
                <td title="${prom}">${prom || "-"}</td>
                <td title="${lin}">${lin || "-"}</td>
                <td title="${clo}">${clo || "-"}</td>
                <td class="num">${qc}</td>
                <td class="num">${qt}</td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;
}

// Funções de formatação
function fmtMoney(val) {
  if (val == null) return "R$ 0,00";
  return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(val);
}

function fmtPctBR(val) {
  if (val == null) return "0%";
  return (val * 100).toLocaleString("pt-BR", { maximumFractionDigits: 1 }) + "%";
}

function norm(str) {
  return str.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function trophyFor(pos) {
  if (pos === 1) return "🏆";
  if (pos === 2) return "🥈";
  if (pos === 3) return "🥉";
  return "";
}

function effPillClass(eff) {
  if (eff >= 0.7) return "p-good";
  if (eff >= 0.4) return "p-med";
  return "p-bad";
}

function cancelPillClass(pct) {
  if (pct <= 0.1) return "p-good";
  if (pct <= 0.3) return "p-med";
  return "p-bad";
}

// Parse CSV
async function parseCSV(csvText) {
  const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
  if (lines.length < 2) return [];

  const header = lines[0].split(";");
  const rows = [];

  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(";");
    const row = {};
    header.forEach((h, idx) => {
      row[h] = values[idx] || "";
    });
    rows.push(row);
  }

  return rows;
}

// Detecção automática de colunas
const KEY = {};
function detectKeys(rows) {
  if (!rows.length) return;
  const headers = Object.keys(rows[0]);

  // Auto-detect principais colunas
  KEY.promotor = headers.find(h => norm(h).includes("promotor")) || "promotor";
  KEY.liner = headers.find(h => norm(h).includes("liner")) || "liner";
  KEY.closer = headers.find(h => norm(h).includes("closer")) || "closer";
  KEY.periodo = headers.find(h => norm(h).includes("periodo") || norm(h).includes("período")) || "periodo";
  KEY.uf = headers.find(h => norm(h).includes("uf") || norm(h).includes("estado")) || "uf";
  KEY.status = headers.find(h => norm(h).includes("status")) || "status do contrato";
  
  // Coluna G (VGV) e primeira coluna
  state.meta.vgvColKey = headers[6] || "G";
  state.meta.firstColKey = headers[0] || "A";
}

// Parse quotas do status
function parseQuotas(statusStr) {
  if (!statusStr) return { vendido: 0, cancelado: 0, total: 0 };
  
  const vendidoMatch = statusStr.match(/(\d+)\s*vendid/i);
  const canceladoMatch = statusStr.match(/(\d+)\s*cancelad/i);
  
  const vendido = vendidoMatch ? parseInt(vendidoMatch[1]) : 0;
  const cancelado = canceladoMatch ? parseInt(canceladoMatch[1]) : 0;
  
  return { vendido, cancelado, total: vendido + cancelado };
}

// Parse valor monetário
function parseMoneyValue(str) {
  if (!str) return 0;
  const clean = str.toString().replace(/[^\d,.-]/g, "").replace(/\./g, "").replace(",", ".");
  const num = parseFloat(clean);
  return isNaN(num) ? 0 : num;
}

// Enriquecer dados
function enrichRow(row) {
  row._quotas = parseQuotas(row[KEY.status]);
  row._valorVgv = parseMoneyValue(row[state.meta.vgvColKey]);
  return row;
}

// Build objetos de profissionais
function buildProfObj(rows, keyField) {
  const map = {};
  rows.forEach(row => {
    const name = (row[keyField] || "").toString().trim();
    if (!name) return;
    
    if (!map[name]) {
      map[name] = {
        name,
        casais: 0,
        vendas: 0,
        cancelamentos: 0,
        vgvTotal: 0,
        rendas: []
      };
    }
    
    const obj = map[name];
    obj.casais++;
    obj.vendas += row._quotas.vendido;
    obj.cancelamentos += row._quotas.cancelado;
    obj.vgvTotal += row._valorVgv;
    
    if (row._valorVgv > 0) {
      obj.rendas.push(row._valorVgv);
    }
  });
  
  return Object.values(map).map(obj => {
    obj.eficiencia = obj.casais > 0 ? obj.vendas / obj.casais : 0;
    obj.pctCancel = obj.vendas > 0 ? obj.cancelamentos / (obj.vendas + obj.cancelamentos) : 0;
    obj.ticketMedio = obj.vendas > 0 ? obj.vgvTotal / obj.vendas : 0;
    obj.rendaMed = obj.rendas.length > 0 ? obj.rendas.reduce((a,b) => a+b, 0) / obj.rendas.length : 0;
    return obj;
  });
}

// Build perfil de renda
function buildPerfilRenda(rows) {
  const faixas = [
    { label: "Até R$ 500k", min: 0, max: 500000 },
    { label: "R$ 500k - R$ 1M", min: 500000, max: 1000000 },
    { label: "R$ 1M - R$ 2M", min: 1000000, max: 2000000 },
    { label: "R$ 2M - R$ 5M", min: 2000000, max: 5000000 },
    { label: "Acima R$ 5M", min: 5000000, max: Infinity }
  ];
  
  return faixas.map(faixa => {
    const matching = rows.filter(r => r._valorVgv >= faixa.min && r._valorVgv < faixa.max);
    const vendas = matching.reduce((sum, r) => sum + r._quotas.vendido, 0);
    const cancelamentos = matching.reduce((sum, r) => sum + r._quotas.cancelado, 0);
    const vgvTotal = matching.reduce((sum, r) => sum + r._valorVgv, 0);
    
    return {
      faixa: faixa.label,
      casais: matching.length,
      vendas,
      cancelamentos,
      vgvTotal,
      eficiencia: matching.length > 0 ? vendas / matching.length : 0,
      pctCancel: vendas > 0 ? cancelamentos / (vendas + cancelamentos) : 0,
      ticketMedio: vendas > 0 ? vgvTotal / vendas : 0
    };
  });
}

// Aplicar filtros
function applyFilters() {
  const periodo = el("periodo").value;
  const uf = el("uf").value;
  const statusFilter = el("statusFilter").value;
  
  state.filtered = state.rows.filter(row => {
    if (periodo && norm(row[KEY.periodo]) !== norm(periodo)) return false;
    if (uf && norm(row[KEY.uf]) !== norm(uf)) return false;
    if (statusFilter) {
      const status = norm(row[KEY.status]);
      if (statusFilter === "vendido" && !status.includes("vendid")) return false;
      if (statusFilter === "cancelado" && !status.includes("cancelad")) return false;
    }
    return true;
  });
}

// Populate dropdowns
function populateDropdowns() {
  const periodos = [...new Set(state.rows.map(r => r[KEY.periodo]).filter(Boolean))].sort();
  const ufs = [...new Set(state.rows.map(r => r[KEY.uf]).filter(Boolean))].sort();
  
  const periodoSelect = el("periodo");
  periodoSelect.innerHTML = '<option value="">Todos os períodos</option>' + 
    periodos.map(p => `<option value="${p}">${p}</option>`).join("");
  
  const ufSelect = el("uf");
  ufSelect.innerHTML = '<option value="">Todas as UFs</option>' + 
    ufs.map(u => `<option value="${u}">${u}</option>`).join("");
}

// Render KPIs
function renderKPIsGerais() {
  const totalCasais = state.filtered.length;
  const totalVendas = state.filtered.reduce((sum, r) => sum + r._quotas.vendido, 0);
  const totalCancelamentos = state.filtered.reduce((sum, r) => sum + r._quotas.cancelado, 0);
  const totalVgv = state.filtered.reduce((sum, r) => sum + r._valorVgv, 0);
  
  const eficienciaGeral = totalCasais > 0 ? totalVendas / totalCasais : 0;
  const pctCancelGeral = totalVendas > 0 ? totalCancelamentos / (totalVendas + totalCancelamentos) : 0;
  const ticketMedio = totalVendas > 0 ? totalVgv / totalVendas : 0;
  
  el("kpis-gerais").innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-value">${totalCasais}</div>
        <div class="kpi-label">Total de Casais</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value">${totalVendas}</div>
        <div class="kpi-label">Total de Vendas</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value">${fmtMoney(totalVgv)}</div>
        <div class="kpi-label">VGV Total</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value">${fmtPctBR(eficienciaGeral)}</div>
        <div class="kpi-label">Eficiência Geral</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value">${fmtPctBR(pctCancelGeral)}</div>
        <div class="kpi-label">Taxa de Cancelamento</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value">${fmtMoney(ticketMedio)}</div>
        <div class="kpi-label">Ticket Médio</div>
      </div>
    </div>
  `;
}

// Render tabela de ranking
function renderRankingTable(list, containerId, titleBadge) {
  const container = el(containerId);
  if (!list.length) {
    container.innerHTML = '<div class="note">Nenhum dado para o filtro selecionado.</div>';
    return;
  }
  
  const ordered = sortedList(list, containerId, "vendas");
  container.innerHTML = `
    <div class="table-wrap">
      <table data-table-id="${containerId}">
        <thead>
          <tr>
            <th style="width:84px">#</th>
            <th class="sortable" data-sort="name">Profissional ${titleBadge?`<span class="badge">${titleBadge}</span>`:""} ${sortIndicator(containerId,"name")}</th>
            <th class="num sortable" data-sort="casais">Casais ${sortIndicator(containerId,"casais")}</th>
            <th class="num sortable" data-sort="vendas">Cotas ${sortIndicator(containerId,"vendas")}</th>
            <th class="num sortable" data-sort="vgvTotal">VGV ${sortIndicator(containerId,"vgvTotal")}</th>
            <th class="num sortable" data-sort="eficiencia">Eficiência ${sortIndicator(containerId,"eficiencia")}</th>
            <th class="num sortable" data-sort="cancelamentos">Cancel ${sortIndicator(containerId,"cancelamentos")}</th>
            <th class="num sortable" data-sort="pctCancel">%Cancel ${sortIndicator(containerId,"pctCancel")}</th>
            <th class="num sortable" data-sort="ticketMedio">Ticket Médio ${sortIndicator(containerId,"ticketMedio")}</th>
            <th class="num hide-sm sortable" data-sort="rendaMed">Renda Média ${sortIndicator(containerId,"rendaMed")}</th>
          </tr>
        </thead>
        <tbody>
          ${ordered.map((it, idx) => {
            const pos = idx + 1;
            return `
              <tr>
                <td class="rank-col">${trophyFor(pos)} ${pos}°</td>
                <td class="name" title="${it.name}">${it.name}</td>
                <td class="num">${it.casais}</td>
                <td class="num">${it.vendas}</td>
                <td class="num">${fmtMoney(it.vgvTotal)}</td>
                <td class="num"><span class="pill ${effPillClass(it.eficiencia)}">${fmtPctBR(it.eficiencia)}</span></td>
                <td class="num">
                  ${
                    containerId === "profissionais-table"
                      ? `<a href="#" class="cancel-link" data-prof-name="${encodeURIComponent(it.name)}">${it.cancelamentos}</a>`
                      : `${it.cancelamentos}`
                  }
                </td>
                <td class="num"><span class="pill ${cancelPillClass(it.pctCancel)}">${fmtPctBR(it.pctCancel)}</span></td>
                <td class="num">${fmtMoney(it.ticketMedio)}</td>
                <td class="num hide-sm">${fmtMoney(it.rendaMed)}</td>
              </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>`;
  
  // Bind header clicks
  const table = container.querySelector("table");
  table.querySelectorAll("thead th.sortable").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.sort;
      setSort(containerId, key);
      renderRankingTable(list, containerId, titleBadge);
    });
  });
  
  // Bind cancelamento clicks (apenas para profissionais)
  if (containerId === "profissionais-table") {
    table.querySelectorAll("a.cancel-link").forEach(a => {
      a.addEventListener("click", (ev) => {
        ev.preventDefault();
        const profName = decodeURIComponent(a.dataset.profName || "");
        const tipoAtual = el("profTipo").value;
        const tipoKey = tipoAtual === "promotor" ? KEY.promotor : 
                       tipoAtual === "liner" ? KEY.liner : KEY.closer;
        
        clearCancelDetail();
        renderCancelDetailForProfessional(tipoKey, profName);
        
        const box = el("cancelamentos-detalhe");
        if (box) box.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    });
  }
}

// Update all data
function updateAll() {
  applyFilters();
  renderKPIsGerais();
  
  // Rankings
  const promotores = buildProfObj(state.filtered, KEY.promotor);
  const liners = buildProfObj(state.filtered, KEY.liner);
  const closers = buildProfObj(state.filtered, KEY.closer);
  
  renderRankingTable(promotores, "ranking-promotor", "Promotor");
  renderRankingTable(liners, "ranking-liner", "Liner");
  renderRankingTable(closers, "ranking-closer", "Closer");
  
  // Profissionais (baseado no tipo selecionado)
  const profTipo = el("profTipo").value;
  const profissionais = profTipo === "promotor" ? promotores :
                       profTipo === "liner" ? liners : closers;
  
  // Filtro de busca
  const searchTerm = norm(el("profSearch").value);
  const filteredProfs = searchTerm ? 
    profissionais.filter(p => norm(p.name).includes(searchTerm)) :
    profissionais;
  
  renderRankingTable(filteredProfs, "profissionais-table");
  clearCancelDetail(); // Limpa detalhe de cancelamentos ao trocar filtros
  
  // Perfil de renda
  const perfilRenda = buildPerfilRenda(state.filtered);
  renderPerfilRenda(perfilRenda, "perfil-renda-single");
}

// Event listeners para filtros
function setupEventListeners() {
  el("periodo").addEventListener("change", updateAll);
  el("uf").addEventListener("change", updateAll);
  el("statusFilter").addEventListener("change", updateAll);
  el("profTipo").addEventListener("change", updateAll);
  el("profSearch").addEventListener("input", updateAll);
}

// Sistema de tabs
function setupTabs() {
  const tabs = document.querySelectorAll(".tabs button");
  const contents = document.querySelectorAll(".tab-content");
  
  tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      tabs.forEach(t => t.classList.remove("active"));
      contents.forEach(c => c.classList.remove("active"));
      
      tab.classList.add("active");
      const targetId = tab.id.replace("tab-", "");
      const targetContent = el(targetId);
      if (targetContent) targetContent.classList.add("active");
    });
  });
}

// Inicialização
async function init() {
  try {
    const response = await fetch(CSV_URL);
    if (!response.ok) throw new Error(`Erro ao carregar CSV: ${response.status}`);
    
    const csvText = await response.text();
    const rawRows = await parseCSV(csvText);
    
    if (!rawRows.length) {
      document.body.innerHTML = '<div class="note">Arquivo CSV vazio ou inválido.</div>';
      return;
    }
    
    detectKeys(rawRows);
    state.rows = rawRows.map(enrichRow);
    
    populateDropdowns();
    setupEventListeners();
    setupTabs();
    updateAll();
    
  } catch (error) {
    console.error("Erro:", error);
    document.body.innerHTML = `
      <div class="note">
        <strong>Erro ao carregar dados:</strong><br>
        ${error.message}<br><br>
        Certifique-se de que o arquivo <code>dados.csv</code> está no mesmo diretório.
      </div>
    `;
  }
}

// Start
init();
</script>
