<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel de Atendimentos</title>
  <meta name="color-scheme" content="dark light" />
  <base href="./" />
  <style>
    :root{
      --bg0:#070A12;
      --bg1:#0B1222;
      --card: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.12);
      --text:#EAF0FF;
      --muted: rgba(234,240,255,.72);
      --good:#5CFFB0;
      --med:#FFDF6C;
      --bad:#FF6B8B;
      --accent:#7C5CFF;
      --accent2:#22D3EE;
      --shadow: 0 20px 60px rgba(0,0,0,.55);
      --radius: 18px;
      --radius2: 12px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 10% 10%, rgba(124,92,255,.25), transparent 55%),
        radial-gradient(900px 600px at 90% 20%, rgba(34,211,238,.18), transparent 55%),
        radial-gradient(800px 600px at 40% 90%, rgba(92,255,176,.12), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
    }
    .wrap{
      display:flex;
      flex-direction:column;
      min-height:100vh;
      margin:0 auto;
      max-width:1400px;
      padding:0 24px;
    }
    header{
      padding:40px 0 30px;
      text-align:center;
      position:relative;
    }
    h1{
      font-size:3.5rem;
      font-weight:700;
      margin:0 0 12px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      letter-spacing:-0.02em;
    }
    .subtitle{
      font-size:1.2rem;
      color:var(--muted);
      font-weight:400;
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:16px;
      margin:30px 0;
      align-items:center;
      justify-content:center;
    }
    .control-group{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:180px;
    }
    .control-group label{
      font-size:0.85rem;
      color:var(--muted);
      font-weight:500;
      letter-spacing:0.5px;
      text-transform:uppercase;
    }
    select, input{
      padding:12px 16px;
      border:1px solid var(--stroke);
      border-radius:var(--radius2);
      background:var(--card);
      color:var(--text);
      font-size:1rem;
      outline:none;
      transition:all 0.2s ease;
      backdrop-filter:blur(10px);
    }
    select:focus, input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(124,92,255,0.1);
    }
    select:hover, input:hover{
      border-color:rgba(255,255,255,0.2);
    }
    .tabs{
      display:flex;
      gap:4px;
      margin:20px 0;
      background:rgba(255,255,255,0.03);
      padding:6px;
      border-radius:var(--radius);
      backdrop-filter:blur(10px);
    }
    .tab{
      flex:1;
      padding:14px 20px;
      text-align:center;
      cursor:pointer;
      border-radius:var(--radius2);
      font-weight:500;
      transition:all 0.2s ease;
      position:relative;
      color:var(--muted);
    }
    .tab:hover{
      color:var(--text);
      background:rgba(255,255,255,0.05);
    }
    .tab.active{
      background:var(--accent);
      color:white;
      box-shadow:var(--shadow);
    }
    .tab-content{
      display:none;
      animation:fadeIn 0.3s ease;
    }
    .tab-content.active{
      display:block;
    }
    @keyframes fadeIn{
      from{opacity:0; transform:translateY(10px)}
      to{opacity:1; transform:translateY(0)}
    }
    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
      gap:24px;
      margin:30px 0;
    }
    .stat-card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      padding:28px 24px;
      text-align:center;
      backdrop-filter:blur(10px);
      position:relative;
      overflow:hidden;
      transition:all 0.3s ease;
    }
    .stat-card:hover{
      transform:translateY(-2px);
      border-color:rgba(255,255,255,0.15);
      box-shadow:var(--shadow);
    }
    .stat-card::before{
      content:'';
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:3px;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .stat-value{
      font-size:2.8rem;
      font-weight:700;
      margin:0 0 8px;
      font-family:var(--mono);
      color:var(--accent2);
    }
    .stat-label{
      font-size:1rem;
      color:var(--muted);
      font-weight:500;
      letter-spacing:0.5px;
    }
    .ranking-list{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      padding:0;
      margin:20px 0;
      backdrop-filter:blur(10px);
      overflow:hidden;
    }
    .ranking-item{
      display:flex;
      align-items:center;
      padding:20px 24px;
      border-bottom:1px solid rgba(255,255,255,0.05);
      transition:all 0.2s ease;
    }
    .ranking-item:last-child{
      border-bottom:none;
    }
    .ranking-item:hover{
      background:rgba(255,255,255,0.03);
    }
    .rank-position{
      font-size:1.5rem;
      font-weight:700;
      color:var(--accent);
      margin-right:20px;
      min-width:40px;
      font-family:var(--mono);
    }
    .rank-name{
      flex:1;
      font-size:1.1rem;
      font-weight:600;
    }
    .rank-value{
      font-size:1.2rem;
      font-weight:700;
      color:var(--accent2);
      font-family:var(--mono);
    }
    .rank-percentage{
      font-size:0.9rem;
      color:var(--muted);
      margin-left:12px;
    }
    .gold{color:#FFD700!important}
    .silver{color:#C0C0C0!important}
    .bronze{color:#CD7F32!important}
    .prof-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
      gap:20px;
      margin:20px 0;
    }
    .prof-card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      padding:20px;
      backdrop-filter:blur(10px);
      transition:all 0.3s ease;
    }
    .prof-card:hover{
      transform:translateY(-2px);
      border-color:rgba(255,255,255,0.15);
      box-shadow:var(--shadow);
    }
    .prof-name{
      font-size:1.2rem;
      font-weight:600;
      margin:0 0 8px;
      color:var(--accent2);
    }
    .prof-details{
      font-size:0.9rem;
      color:var(--muted);
      line-height:1.4;
    }
    .prof-details strong{
      color:var(--text);
    }
    .note{
      background:rgba(124,92,255,0.1);
      border:1px solid rgba(124,92,255,0.2);
      border-radius:var(--radius2);
      padding:16px 20px;
      margin:20px 0;
      font-size:0.9rem;
      color:var(--muted);
      line-height:1.5;
    }
    .pill{
      background:var(--accent);
      color:white;
      padding:2px 8px;
      border-radius:12px;
      font-size:0.8rem;
      font-weight:600;
      font-family:var(--mono);
    }
    .error{
      background:rgba(255,107,139,0.1);
      border:1px solid rgba(255,107,139,0.3);
      border-radius:var(--radius2);
      padding:20px;
      margin:20px 0;
      color:#ff6b8b;
      text-align:center;
    }
    .loading{
      text-align:center;
      padding:40px 20px;
      color:var(--muted);
      font-size:1.1rem;
    }
    @media (max-width: 768px){
      .wrap{padding:0 16px}
      h1{font-size:2.5rem}
      .controls{flex-direction:column; align-items:stretch}
      .control-group{min-width:auto}
      .tabs{flex-direction:column}
      .stats{grid-template-columns:1fr}
      .prof-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Painel de Atendimentos</h1>
      <p class="subtitle">Dashboard analítico com métricas em tempo real</p>
    </header>

    <div class="controls">
      <div class="control-group">
        <label>Período</label>
        <select id="periodoSelect">
          <option value="todos">Todos os períodos</option>
          <option value="hoje">Hoje</option>
          <option value="ontem">Ontem</option>
          <option value="ultimos7">Últimos 7 dias</option>
          <option value="ultimos30">Últimos 30 dias</option>
          <option value="mes_atual">Mês atual</option>
          <option value="mes_anterior">Mês anterior</option>
        </select>
      </div>
      <div class="control-group">
        <label>Status Contrato</label>
        <select id="statusSelect">
          <option value="todos">Todos</option>
          <option value="vendido">Vendido</option>
          <option value="nao_vendido">Não Vendido</option>
          <option value="pendente">Pendente</option>
        </select>
      </div>
      <div class="control-group">
        <label>Profissional</label>
        <select id="profTipo">
          <option value="pm1">PM1 (Captador)</option>
          <option value="pm2">PM2 (Linner/Consultor)</option>
          <option value="pm3">PM3 (Closer)</option>
        </select>
      </div>
      <div class="control-group">
        <label>Nome</label>
        <select id="profNome">
          <option value="todos">Todos</option>
        </select>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="resumo">📊 Resumo</div>
      <div class="tab" data-tab="captador">🎯 Ranking Captador</div>
      <div class="tab" data-tab="linner">💬 Ranking Linner</div>
      <div class="tab" data-tab="profissionais">👥 Profissionais</div>
    </div>

    <div id="content">
      <div id="loading" class="loading">Carregando dados...</div>
      <div id="error" class="error" style="display:none"></div>

      <div id="tab-resumo" class="tab-content active">
        <div class="stats" id="stats"></div>
      </div>

      <div id="tab-captador" class="tab-content">
        <div class="note">
          Este ranking usa a coluna <span class="pill">PM1</span> (coluna E no CSV).
        </div>
        <div id="ranking-captador"></div>
      </div>

      <div id="tab-linner" class="tab-content">
        <div class="note">
          Este ranking usa a coluna <span class="pill">PM2</span> (coluna G no CSV).
        </div>
        <div id="ranking-linner"></div>
      </div>

      <div id="tab-profissionais" class="tab-content">
        <div class="prof-grid" id="prof-grid"></div>
      </div>
    </div>
  </div>

<script>
const CSV_URL = new URL("dados.csv", document.baseURI).toString();

const el = (id) => document.getElementById(id);
const state = { rows: [], filtered: [], profStatus: {} };

function normalizeHeader(str) {
  return str.toLowerCase().trim().replace(/\s+/g, " ");
}

function parseCSV(csvText) {
  const lines = csvText.trim().split('\n');
  if (lines.length === 0) return [];
  
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  const data = [];
  
  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(',').map(v => v.trim().replace(/"/g, ''));
    if (values.length !== headers.length) continue;
    
    const row = {};
    headers.forEach((header, index) => {
      const normalizedHeader = normalizeHeader(header);
      row[normalizedHeader] = values[index] || '';
    });
    data.push(row);
  }
  return data;
}

function parseBRDate(dateStr) {
  if (!dateStr || typeof dateStr !== 'string') return null;
  
  dateStr = dateStr.trim();
  if (!dateStr) return null;
  
  let match = dateStr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (match) {
    const [, day, month, year] = match;
    return new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
  }
  
  match = dateStr.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (match) {
    const [, year, month, day] = match;
    return new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
  }
  
  return null;
}

function parseMoneyBR(str) {
  if (!str || typeof str !== 'string') return 0;
  
  const cleaned = str.replace(/[^\d,.-]/g, '');
  if (!cleaned) return 0;
  
  if (cleaned.includes(',') && cleaned.includes('.')) {
    const lastComma = cleaned.lastIndexOf(',');
    const lastDot = cleaned.lastIndexOf('.');
    
    if (lastComma > lastDot) {
      return parseFloat(cleaned.replace(/\./g, '').replace(',', '.')) || 0;
    } else {
      return parseFloat(cleaned.replace(/,/g, '')) || 0;
    }
  } else if (cleaned.includes(',')) {
    return parseFloat(cleaned.replace(',', '.')) || 0;
  } else {
    return parseFloat(cleaned) || 0;
  }
}

function formatMoney(value) {
  return new Intl.NumberFormat('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  }).format(value);
}

function buildObjects(csvData) {
  if (!csvData || csvData.length === 0) {
    throw new Error("CSV vazio ou inválido");
  }

  const headersRaw = Object.keys(csvData[0]);
  const idx = (key) => headersRaw.findIndex(h => normalizeHeader(h) === normalizeHeader(key));

  const DATA_KEY = idx("data") !== -1 ? "data" : (idx("data de atendimento") !== -1 ? "data de atendimento" : null);
  if (!DATA_KEY) {
    throw new Error(`Cabeçalho "data" ou "data de atendimento" não encontrado. Cabeçalhos lidos: ${headersRaw.join(" | ")}`);
  }

  return csvData.map((obj, index) => {
    try {
      obj._date = parseBRDate(obj[DATA_KEY]);
      obj._valor = parseMoneyBR(obj["valor vendido"]);
      obj._renda = parseMoneyBR(obj["renda"] ?? obj["renda do casal"] ?? obj["renda familiar"]);
      return obj;
    } catch (err) {
      console.warn(`Erro na linha ${index + 2}:`, err);
      return obj;
    }
  });
}

function applyFilters(rows) {
  const periodo = el("periodoSelect").value;
  const status = el("statusSelect").value;
  const profTipo = el("profTipo").value;
  const profNome = el("profNome").value;

  let filtered = rows.slice();

  if (periodo !== "todos") {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    
    filtered = filtered.filter(row => {
      if (!row._date) return false;
      const rowDate = new Date(row._date.getFullYear(), row._date.getMonth(), row._date.getDate());
      
      switch (periodo) {
        case "hoje":
          return rowDate.getTime() === today.getTime();
        case "ontem":
          const yesterday = new Date(today);
          yesterday.setDate(yesterday.getDate() - 1);
          return rowDate.getTime() === yesterday.getTime();
        case "ultimos7":
          const week = new Date(today);
          week.setDate(week.getDate() - 6);
          return rowDate >= week;
        case "ultimos30":
          const month = new Date(today);
          month.setDate(month.getDate() - 29);
          return rowDate >= month;
        case "mes_atual":
          return rowDate.getMonth() === today.getMonth() && 
                 rowDate.getFullYear() === today.getFullYear();
        case "mes_anterior":
          const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
          return rowDate.getMonth() === lastMonth.getMonth() && 
                 rowDate.getFullYear() === lastMonth.getFullYear();
        default:
          return true;
      }
    });
  }

  if (status !== "todos") {
    filtered = filtered.filter(row => {
      const s = normalizeHeader(row["status do contrato"] || "");
      switch (status) {
        case "vendido": return s.includes("vendido");
        case "nao_vendido": return s.includes("não vendido") || s.includes("nao vendido");
        case "pendente": return s.includes("pendente");
        default: return true;
      }
    });
  }

  if (profNome !== "todos") {
    filtered = filtered.filter(row => {
      const nome = normalizeHeader(row[profTipo] || "");
      return nome.includes(normalizeHeader(profNome));
    });
  }

  return filtered;
}

function updateStats(rows) {
  const total = rows.length;
  const vendidos = rows.filter(r => normalizeHeader(r["status do contrato"] || "").includes("vendido")).length;
  const pendentes = rows.filter(r => normalizeHeader(r["status do contrato"] || "").includes("pendente")).length;
  const totalValor = rows.reduce((sum, r) => sum + (r._valor || 0), 0);
  const mediaRenda = rows.length ? rows.reduce((sum, r) => sum + (r._renda || 0), 0) / rows.length : 0;
  
  const conversao = total > 0 ? ((vendidos / total) * 100).toFixed(1) : "0.0";

  el("stats").innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${total}</div>
      <div class="stat-label">Total Atendimentos</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${vendidos}</div>
      <div class="stat-label">Vendas Realizadas</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${conversao}%</div>
      <div class="stat-label">Taxa de Conversão</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${formatMoney(totalValor)}</div>
      <div class="stat-label">Volume Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${formatMoney(mediaRenda)}</div>
      <div class="stat-label">Renda Média</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${pendentes}</div>
      <div class="stat-label">Contratos Pendentes</div>
    </div>
  `;
}

function groupRankingByField(rows, field, displayName) {
  const counts = new Map();
  const sales = new Map();
  const values = new Map();
  
  rows.forEach(row => {
    const name = (row[field] || "").trim();
    if (!name || name.toLowerCase() === "n/a") return;
    
    counts.set(name, (counts.get(name) || 0) + 1);
    
    const isVendido = normalizeHeader(row["status do contrato"] || "").includes("vendido");
    if (isVendido) {
      sales.set(name, (sales.get(name) || 0) + 1);
      values.set(name, (values.get(name) || 0) + (row._valor || 0));
    }
  });
  
  return Array.from(counts.entries())
    .map(([name, total]) => ({
      name,
      total,
      vendas: sales.get(name) || 0,
      valor: values.get(name) || 0,
      conversao: total > 0 ? ((sales.get(name) || 0) / total * 100) : 0
    }))
    .sort((a, b) => b.vendas - a.vendas || b.valor - a.valor);
}

function renderRanking(data, containerId) {
  const container = el(containerId);
  if (data.length === 0) {
    container.innerHTML = '<div class="note">Nenhum dado encontrado para o período selecionado.</div>';
    return;
  }

  let html = '<div class="ranking-list">';
  
  data.forEach((item, index) => {
    const position = index + 1;
    let positionClass = '';
    if (position === 1) positionClass = 'gold';
    else if (position === 2) positionClass = 'silver';  
    else if (position === 3) positionClass = 'bronze';

    html += `
      <div class="ranking-item">
        <div class="rank-position ${positionClass}">${position}°</div>
        <div class="rank-name">${item.name}</div>
        <div class="rank-value">${item.vendas}</div>
        <div class="rank-percentage">${item.conversao.toFixed(1)}%</div>
      </div>
    `;
  });
  
  html += '</div>';
  container.innerHTML = html;
}

function renderRankingCaptador() {
  const list = groupRankingByField(state.filtered, "pm1", "pm1");
  renderRanking(list, "ranking-captador");
}

function renderRankingLinner() {
  const list = groupRankingByField(state.filtered, "pm2", "pm2");
  renderRanking(list, "ranking-linner");
}

function normName(str) {
  if (!str || typeof str !== 'string') return "";
  return str.trim();
}

function makeProfKey(tipo, nome, equipe) {
  return `${tipo}|${nome}|${equipe}`;
}

function listProfessionals(rows) {
  const set = new Map();
  
  rows.forEach(r => {
    const pm = normName(r["pm1"]);
    if (pm) {
      const eq = normName(r["equipe"] || "");
      const k = makeProfKey("pm1", pm, eq);
      if (!set.has(k)) set.set(k, { nome: pm, tipo: "pm1", equipe: eq });
    }

    const li = normName(r["pm2"]);
    if (li) {
      const k = makeProfKey("pm2", li, "");
      if (!set.has(k)) set.set(k, { nome: li, tipo: "pm2", equipe: "" });
    }

    const co = normName(r["pm3"]);
    if (co) {
      const k = makeProfKey("pm3", co, "");
      if (!set.has(k)) set.set(k, { nome: co, tipo: "pm3", equipe: "" });
    }
  });
  
  return Array.from(set.values()).sort((a, b) => {
    const order = { "pm1": 1, "pm2": 2, "pm3": 3 };
    const diff = (order[a.tipo] || 9) - (order[b.tipo] || 9);
    return diff !== 0 ? diff : a.nome.localeCompare(b.nome);
  });
}

function countByProfessional(rows, prof) {
  const field = prof.tipo;
  const nome = prof.nome;
  
  const filtered = rows.filter(r => normName(r[field]) === nome);
  const vendidos = filtered.filter(r => normalizeHeader(r["status do contrato"] || "").includes("vendido"));
  const totalValor = vendidos.reduce((sum, r) => sum + (r._valor || 0), 0);
  
  return {
    total: filtered.length,
    vendidos: vendidos.length,
    valor: totalValor,
    conversao: filtered.length > 0 ? (vendidos.length / filtered.length * 100) : 0
  };
}

function renderProfessionals() {
  const professionals = listProfessionals(state.rows);
  const container = el("prof-grid");
  
  if (professionals.length === 0) {
    container.innerHTML = '<div class="note">Nenhum profissional encontrado.</div>';
    return;
  }
  
  let html = '';
  professionals.forEach(prof => {
    const stats = countByProfessional(state.filtered, prof);
    const tipoLabel = prof.tipo === "pm1" ? "Captador" : prof.tipo === "pm2" ? "Linner/Consultor" : "Closer";
    
    html += `
      <div class="prof-card">
        <div class="prof-name">${prof.nome}</div>
        <div class="prof-details">
          <strong>Tipo:</strong> ${tipoLabel}<br>
          ${prof.equipe ? `<strong>Equipe:</strong> ${prof.equipe}<br>` : ''}
          <strong>Atendimentos:</strong> ${stats.total}<br>
          <strong>Vendas:</strong> ${stats.vendidos}<br>
          <strong>Conversão:</strong> ${stats.conversao.toFixed(1)}%<br>
          <strong>Volume:</strong> ${formatMoney(stats.valor)}
        </div>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

function updateProfessionalFilter() {
  const tipo = el("profTipo").value;
  const nomeSelect = el("profNome");
  
  nomeSelect.innerHTML = '<option value="todos">Todos</option>';
  
  const professionals = listProfessionals(state.rows)
    .filter(p => p.tipo === tipo)
    .map(p => p.nome)
    .filter((name, index, arr) => arr.indexOf(name) === index)
    .sort();
  
  professionals.forEach(nome => {
    const option = document.createElement("option");
    option.value = nome;
    option.textContent = nome;
    nomeSelect.appendChild(option);
  });
}

function updateAll() {
  state.filtered = applyFilters(state.rows);
  updateStats(state.filtered);
  renderRankingCaptador();
  renderRankingLinner();
  renderProfessionals();
}

function setupEventListeners() {
  ["periodoSelect", "statusSelect", "profTipo", "profNome"].forEach(id => {
    el(id).addEventListener("change", updateAll);
  });

  el("profTipo").addEventListener("change", updateProfessionalFilter);

  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      const targetTab = tab.dataset.tab;
      
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      
      tab.classList.add("active");
      el(`tab-${targetTab}`).classList.add("active");
    });
  });
}

async function init() {
  try {
    el("loading").style.display = "block";
    el("error").style.display = "none";
    
    const response = await fetch(CSV_URL);
    if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);
    
    const csvText = await response.text();
    const csvData = parseCSV(csvText);
    
    state.rows = buildObjects(csvData);
    
    updateProfessionalFilter();
    updateAll();
    
    el("loading").style.display = "none";
  } catch (error) {
    console.error("Erro:", error);
    el("loading").style.display = "none";
    el("error").style.display = "block";
    el("error").textContent = `Erro ao carregar dados: ${error.message}`;
  }
}

setupEventListeners();
init();
</script>
</body>
</html>
