<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel de Atendimentos (dados.csv)</title>
  <meta name="color-scheme" content="dark light" />
  <base href="./" />
  <style>
    :root{
      --bg0:#070A12;
      --bg1:#0B1222;
      --card: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.12);
      --text:#EAF0FF;
      --muted: rgba(234,240,255,.72);
      --good:#5CFFB0;
      --med:#FFDF6C;
      --bad:#FF6B8B;
      --accent:#7C5CFF;
      --accent2:#22D3EE;
      --shadow: 0 20px 60px rgba(0,0,0,.55);
      --radius: 18px;
      --radius2: 12px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 10% 10%, rgba(124,92,255,.25), transparent 55%),
        radial-gradient(900px 600px at 90% 20%, rgba(34,211,238,.18), transparent 55%),
        radial-gradient(800px 600px at 40% 90%, rgba(92,255,176,.12), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
    }
    .wrap{
      display:flex;
      flex-direction:column;
      min-height:100vh;
      margin:0 auto;
      max-width:1400px;
      padding:0 24px;
    }
    header{
      padding:40px 0 30px;
      text-align:center;
      position:relative;
    }
    h1{
      font-size:3.5rem;
      font-weight:700;
      margin:0 0 12px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      letter-spacing:-0.02em;
    }
    .subtitle{
      font-size:1.2rem;
      color:var(--muted);
      font-weight:400;
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:16px;
      margin:30px 0;
      align-items:center;
      justify-content:center;
    }
    .control-group{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:180px;
    }
    .control-group label{
      font-size:0.85rem;
      color:var(--muted);
      font-weight:500;
      letter-spacing:0.5px;
      text-transform:uppercase;
    }
    select, input{
      padding:12px 16px;
      border:1px solid var(--stroke);
      border-radius:var(--radius2);
      background:var(--card);
      color:var(--text);
      font-size:1rem;
      outline:none;
      transition:all 0.2s ease;
      backdrop-filter:blur(10px);
    }
    select:focus, input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(124,92,255,0.1);
    }
    select:hover, input:hover{
      border-color:rgba(255,255,255,0.2);
    }
    .tabs{
      display:flex;
      gap:4px;
      margin:20px 0;
      background:rgba(255,255,255,0.03);
      padding:6px;
      border-radius:var(--radius);
      backdrop-filter:blur(10px);
    }
    .tab{
      flex:1;
      padding:14px 20px;
      text-align:center;
      cursor:pointer;
      border-radius:var(--radius2);
      font-weight:500;
      transition:all 0.2s ease;
      position:relative;
      color:var(--muted);
      user-select:none;
    }
    .tab:hover{
      color:var(--text);
      background:rgba(255,255,255,0.05);
    }
    .tab.active{
      background:var(--accent);
      color:white;
      box-shadow:var(--shadow);
    }
    .tab-content{
      display:none;
      animation:fadeIn 0.3s ease;
    }
    .tab-content.active{
      display:block;
    }
    @keyframes fadeIn{
      from{opacity:0; transform:translateY(10px)}
      to{opacity:1; transform:translateY(0)}
    }
    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
      gap:24px;
      margin:30px 0;
    }
    .stat-card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      padding:28px 24px;
      text-align:center;
      backdrop-filter:blur(10px);
      position:relative;
      overflow:hidden;
      transition:all 0.3s ease;
    }
    .stat-card:hover{
      transform:translateY(-2px);
      border-color:rgba(255,255,255,0.15);
      box-shadow:var(--shadow);
    }
    .stat-card::before{
      content:'';
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:3px;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .stat-value{
      font-size:2.8rem;
      font-weight:700;
      margin:0 0 8px;
      font-family:var(--mono);
      color:var(--accent2);
    }
    .stat-label{
      font-size:1rem;
      color:var(--muted);
      font-weight:500;
      letter-spacing:0.5px;
    }
    .ranking-list{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      padding:0;
      margin:20px 0;
      backdrop-filter:blur(10px);
      overflow:hidden;
    }
    .ranking-item{
      display:flex;
      align-items:center;
      padding:20px 24px;
      border-bottom:1px solid rgba(255,255,255,0.05);
      transition:all 0.2s ease;
      gap:10px;
    }
    .ranking-item:last-child{ border-bottom:none; }
    .ranking-item:hover{ background:rgba(255,255,255,0.03); }
    .rank-position{
      font-size:1.5rem;
      font-weight:700;
      color:var(--accent);
      margin-right:10px;
      min-width:44px;
      font-family:var(--mono);
    }
    .rank-name{
      flex:1;
      font-size:1.1rem;
      font-weight:600;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .rank-value{
      font-size:1.2rem;
      font-weight:700;
      color:var(--accent2);
      font-family:var(--mono);
      min-width:64px;
      text-align:right;
    }
    .rank-percentage{
      font-size:0.9rem;
      color:var(--muted);
      margin-left:10px;
      min-width:70px;
      text-align:right;
      font-family:var(--mono);
    }
    .rank-extra{
      font-size:0.9rem;
      color:var(--muted);
      margin-left:10px;
      min-width:160px;
      text-align:right;
      font-family:var(--mono);
    }
    .gold{color:#FFD700!important}
    .silver{color:#C0C0C0!important}
    .bronze{color:#CD7F32!important}
    .prof-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
      gap:20px;
      margin:20px 0;
    }
    .prof-card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      padding:20px;
      backdrop-filter:blur(10px);
      transition:all 0.3s ease;
    }
    .prof-card:hover{
      transform:translateY(-2px);
      border-color:rgba(255,255,255,0.15);
      box-shadow:var(--shadow);
    }
    .prof-name{
      font-size:1.2rem;
      font-weight:600;
      margin:0 0 8px;
      color:var(--accent2);
    }
    .prof-details{
      font-size:0.9rem;
      color:var(--muted);
      line-height:1.45;
    }
    .prof-details strong{ color:var(--text); }
    .note{
      background:rgba(124,92,255,0.1);
      border:1px solid rgba(124,92,255,0.2);
      border-radius:var(--radius2);
      padding:16px 20px;
      margin:20px 0;
      font-size:0.9rem;
      color:var(--muted);
      line-height:1.5;
    }
    .pill{
      background:var(--accent);
      color:white;
      padding:2px 8px;
      border-radius:12px;
      font-size:0.8rem;
      font-weight:600;
      font-family:var(--mono);
    }
    .error{
      background:rgba(255,107,139,0.1);
      border:1px solid rgba(255,107,139,0.3);
      border-radius:var(--radius2);
      padding:20px;
      margin:20px 0;
      color:#ff6b8b;
      text-align:center;
      white-space:pre-wrap;
    }
    .loading{
      text-align:center;
      padding:40px 20px;
      color:var(--muted);
      font-size:1.1rem;
    }
    @media (max-width: 768px){
      .wrap{padding:0 16px}
      h1{font-size:2.5rem}
      .controls{flex-direction:column; align-items:stretch}
      .control-group{min-width:auto}
      .tabs{flex-direction:column}
      .stats{grid-template-columns:1fr}
      .prof-grid{grid-template-columns:1fr}
      .rank-extra{display:none;}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Painel de Atendimentos</h1>
      <p class="subtitle">Dashboard analítico a partir do <span class="pill">dados.csv</span> (GitHub Pages)</p>
    </header>

    <div class="controls">
      <div class="control-group">
        <label>Período</label>
        <select id="periodoSelect">
          <option value="todos">Todos os períodos</option>
          <option value="hoje">Hoje</option>
          <option value="ontem">Ontem</option>
          <option value="ultimos7">Últimos 7 dias</option>
          <option value="ultimos30">Últimos 30 dias</option>
          <option value="mes_atual">Mês atual</option>
          <option value="mes_anterior">Mês anterior</option>
        </select>
      </div>

      <div class="control-group">
        <label>Status do contrato</label>
        <select id="statusSelect">
          <option value="todos">Todos</option>
          <option value="ativo">Ativo</option>
          <option value="cancelado">Cancelado</option>
          <option value="sem_status">Sem status</option>
        </select>
      </div>

      <div class="control-group">
        <label>Profissional</label>
        <select id="profTipo">
          <option value="promotor de marketing">Promotor de marketing</option>
          <option value="liner">Liner</option>
          <option value="closer">Closer</option>
        </select>
      </div>

      <div class="control-group">
        <label>Nome</label>
        <select id="profNome">
          <option value="todos">Todos</option>
        </select>
      </div>

      <div class="control-group">
        <label>UF</label>
        <select id="ufSelect">
          <option value="todos">Todas</option>
        </select>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="resumo">📊 Resumo</div>
      <div class="tab" data-tab="ranking-promotor">🎯 Ranking Promotor</div>
      <div class="tab" data-tab="ranking-liner">💬 Ranking Liner</div>
      <div class="tab" data-tab="ranking-closer">🤝 Ranking Closer</div>
      <div class="tab" data-tab="profissionais">👥 Profissionais</div>
    </div>

    <div id="content">
      <div id="loading" class="loading">Carregando dados...</div>
      <div id="error" class="error" style="display:none"></div>

      <div id="tab-resumo" class="tab-content active">
        <div class="stats" id="stats"></div>
        <div class="note" id="dataset-note" style="display:none"></div>
      </div>

      <div id="tab-ranking-promotor" class="tab-content">
        <div class="note">
          Ranking baseado na coluna <span class="pill">Promotor de marketing</span>.
        </div>
        <div id="ranking-promotor"></div>
      </div>

      <div id="tab-ranking-liner" class="tab-content">
        <div class="note">
          Ranking baseado na coluna <span class="pill">Liner</span>.
        </div>
        <div id="ranking-liner"></div>
      </div>

      <div id="tab-ranking-closer" class="tab-content">
        <div class="note">
          Ranking baseado na coluna <span class="pill">Closer</span>.
        </div>
        <div id="ranking-closer"></div>
      </div>

      <div id="tab-profissionais" class="tab-content">
        <div class="prof-grid" id="prof-grid"></div>
      </div>
    </div>
  </div>

<script>
  // GitHub Pages: mantenha index.html e dados.csv na mesma pasta.
  const CSV_URL = new URL("dados.csv", document.baseURI).toString();

  const el = (id) => document.getElementById(id);
  const state = { rows: [], filtered: [] };

  function normalizeHeader(str) {
    return (str ?? "").toString().toLowerCase().trim().replace(/\s+/g, " ");
  }

  // CSV do arquivo fornecido está com ';' como separador
  // e possui campos com aspas e ';' dentro -> parser simples com suporte a aspas.
  function parseDelimited(text, delimiter = ";") {
    const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n").filter(l => l.trim().length);
    if (!lines.length) return [];

    const parseLine = (line) => {
      const out = [];
      let cur = "";
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i+1] === '"') { cur += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === delimiter && !inQuotes) {
          out.push(cur);
          cur = "";
        } else {
          cur += ch;
        }
      }
      out.push(cur);
      return out.map(v => v.trim());
    };

    const headers = parseLine(lines[0]).map(h => h.replace(/^"|"$/g, ""));
    const data = [];

    for (let i = 1; i < lines.length; i++) {
      const vals = parseLine(lines[i]).map(v => v.replace(/^"|"$/g, ""));
      if (vals.length !== headers.length) continue;

      const row = {};
      headers.forEach((h, idx) => row[normalizeHeader(h)] = vals[idx] ?? "");
      data.push(row);
    }
    return data;
  }

  function parseBRDate(dateStr) {
    if (!dateStr || typeof dateStr !== "string") return null;
    const s = dateStr.trim();
    if (!s) return null;

    let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (m) {
      const [, d, mo, y] = m;
      return new Date(+y, (+mo)-1, +d);
    }
    m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (m) {
      const [, y, mo, d] = m;
      return new Date(+y, (+mo)-1, +d);
    }
    return null;
  }

  function parseMoneyBR(str) {
    if (!str || typeof str !== "string") return 0;
    const cleaned = str.replace(/[^\d,.-]/g, "");
    if (!cleaned) return 0;

    if (cleaned.includes(",") && cleaned.includes(".")) {
      const lastComma = cleaned.lastIndexOf(",");
      const lastDot = cleaned.lastIndexOf(".");
      if (lastComma > lastDot) return parseFloat(cleaned.replace(/\./g, "").replace(",", ".")) || 0;
      return parseFloat(cleaned.replace(/,/g, "")) || 0;
    }
    if (cleaned.includes(",")) return parseFloat(cleaned.replace(",", ".")) || 0;
    return parseFloat(cleaned) || 0;
  }

  function formatMoney(v) {
    return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(v || 0);
  }

  function buildObjects(rows) {
    if (!rows || !rows.length) throw new Error("CSV vazio ou inválido.");

    // chaves do seu CSV
    const DATA_KEY = normalizeHeader("data de atendimento");
    const VALOR_KEY = normalizeHeader("valor vendido");
    const RENDA_KEY = normalizeHeader("renda");
    const STATUS_CONTRATO_KEY = normalizeHeader("status do contrato");

    return rows.map((r) => {
      const out = { ...r };
      out._date = parseBRDate(out[DATA_KEY]);
      out._valor = parseMoneyBR(out[VALOR_KEY]);
      out._renda = parseMoneyBR(out[RENDA_KEY]);
      out._statusContratoNorm = normalizeHeader(out[STATUS_CONTRATO_KEY] || "");
      return out;
    });
  }

  function contractBucket(row) {
    const s = row._statusContratoNorm || "";
    if (!s) return "sem_status";
    if (s.includes("cancelado")) return "cancelado";
    if (s.includes("ativo")) return "ativo";
    return "outro";
  }

  function applyFilters(rows) {
    const periodo = el("periodoSelect").value;
    const status = el("statusSelect").value;
    const profTipo = normalizeHeader(el("profTipo").value);
    const profNome = el("profNome").value;
    const uf = el("ufSelect").value;

    let filtered = rows.slice();

    if (periodo !== "todos") {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

      filtered = filtered.filter(row => {
        if (!row._date) return false;
        const rowDate = new Date(row._date.getFullYear(), row._date.getMonth(), row._date.getDate());

        switch (periodo) {
          case "hoje":
            return rowDate.getTime() === today.getTime();
          case "ontem": {
            const y = new Date(today); y.setDate(y.getDate() - 1);
            return rowDate.getTime() === y.getTime();
          }
          case "ultimos7": {
            const d = new Date(today); d.setDate(d.getDate() - 6);
            return rowDate >= d;
          }
          case "ultimos30": {
            const d = new Date(today); d.setDate(d.getDate() - 29);
            return rowDate >= d;
          }
          case "mes_atual":
            return rowDate.getMonth() === today.getMonth() && rowDate.getFullYear() === today.getFullYear();
          case "mes_anterior": {
            const lm = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            return rowDate.getMonth() === lm.getMonth() && rowDate.getFullYear() === lm.getFullYear();
          }
          default:
            return true;
        }
      });
    }

    if (status !== "todos") {
      filtered = filtered.filter(r => contractBucket(r) === status);
    }

    if (uf !== "todos") {
      filtered = filtered.filter(r => (r[normalizeHeader("uf")] || "").trim() === uf);
    }

    if (profNome !== "todos") {
      filtered = filtered.filter(r => normalizeHeader(r[profTipo] || "") === normalizeHeader(profNome));
    }

    return filtered;
  }

  function updateStats(rows) {
    const total = rows.length;

    const ativos = rows.filter(r => contractBucket(r) === "ativo").length;
    const cancelados = rows.filter(r => contractBucket(r) === "cancelado").length;
    const semStatus = rows.filter(r => contractBucket(r) === "sem_status").length;

    const volumeTotal = rows.reduce((s, r) => s + (r._valor || 0), 0);
    const rendaMedia = total ? rows.reduce((s, r) => s + (r._renda || 0), 0) / total : 0;

    const taxaAtivo = total ? ((ativos / total) * 100).toFixed(1) : "0.0";

    el("stats").innerHTML = `
      <div class="stat-card">
        <div class="stat-value">${total}</div>
        <div class="stat-label">Total de atendimentos</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${ativos}</div>
        <div class="stat-label">Contratos Ativos</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${taxaAtivo}%</div>
        <div class="stat-label">Taxa de Ativo</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${cancelados}</div>
        <div class="stat-label">Contratos Cancelados</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${formatMoney(volumeTotal)}</div>
        <div class="stat-label">Valor vendido (total)</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${formatMoney(rendaMedia)}</div>
        <div class="stat-label">Renda média</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${semStatus}</div>
        <div class="stat-label">Sem status do contrato</div>
      </div>
    `;
  }

  function groupRankingByField(rows, fieldKeyNorm) {
    const counts = new Map();
    const ativos = new Map();
    const cancelados = new Map();
    const values = new Map();

    rows.forEach(r => {
      const name = (r[fieldKeyNorm] || "").trim();
      if (!name) return;

      counts.set(name, (counts.get(name) || 0) + 1);

      const bucket = contractBucket(r);
      if (bucket === "ativo") ativos.set(name, (ativos.get(name) || 0) + 1);
      if (bucket === "cancelado") cancelados.set(name, (cancelados.get(name) || 0) + 1);

      values.set(name, (values.get(name) || 0) + (r._valor || 0));
    });

    return Array.from(counts.entries()).map(([name, total]) => {
      const a = ativos.get(name) || 0;
      return {
        name,
        total,
        ativos: a,
        cancelados: cancelados.get(name) || 0,
        valor: values.get(name) || 0,
        taxaAtivo: total ? (a / total * 100) : 0
      };
    }).sort((x, y) => (y.ativos - x.ativos) || (y.valor - x.valor) || (y.total - x.total) || x.name.localeCompare(y.name));
  }

  function renderRanking(data, containerId) {
    const container = el(containerId);
    if (!data.length) {
      container.innerHTML = '<div class="note">Nenhum dado para os filtros selecionados.</div>';
      return;
    }

    let html = '<div class="ranking-list">';
    data.forEach((item, idx) => {
      const pos = idx + 1;
      let cls = "";
      if (pos === 1) cls = "gold";
      else if (pos === 2) cls = "silver";
      else if (pos === 3) cls = "bronze";

      html += `
        <div class="ranking-item">
          <div class="rank-position ${cls}">${pos}°</div>
          <div class="rank-name" title="${item.name}">${item.name}</div>
          <div class="rank-value">${item.ativos}</div>
          <div class="rank-percentage">${item.taxaAtivo.toFixed(1)}%</div>
          <div class="rank-extra">${formatMoney(item.valor)}</div>
        </div>
      `;
    });
    html += "</div>";
    container.innerHTML = html;
  }

  function listProfessionals(rows) {
    const fields = [
      normalizeHeader("promotor de marketing"),
      normalizeHeader("liner"),
      normalizeHeader("closer")
    ];

    const set = new Map(); // key -> {tipo, nome}
    rows.forEach(r => {
      fields.forEach(f => {
        const nome = (r[f] || "").trim();
        if (!nome) return;
        const k = `${f}|${nome}`;
        if (!set.has(k)) set.set(k, { tipo: f, nome });
      });
    });

    const order = {
      [normalizeHeader("promotor de marketing")]: 1,
      [normalizeHeader("liner")]: 2,
      [normalizeHeader("closer")]: 3
    };

    return Array.from(set.values()).sort((a,b) => (order[a.tipo]-order[b.tipo]) || a.nome.localeCompare(b.nome));
  }

  function countByProfessional(rows, prof) {
    const filtered = rows.filter(r => normalizeHeader(r[prof.tipo] || "") === normalizeHeader(prof.nome));
    const ativos = filtered.filter(r => contractBucket(r) === "ativo");
    const valor = ativos.reduce((s, r) => s + (r._valor || 0), 0);

    return {
      total: filtered.length,
      ativos: ativos.length,
      taxaAtivo: filtered.length ? (ativos.length / filtered.length * 100) : 0,
      valor
    };
  }

  function tipoLabel(tipoNorm) {
    if (tipoNorm === normalizeHeader("promotor de marketing")) return "Promotor de marketing";
    if (tipoNorm === normalizeHeader("liner")) return "Liner";
    if (tipoNorm === normalizeHeader("closer")) return "Closer";
    return tipoNorm;
  }

  function renderProfessionals() {
    const professionals = listProfessionals(state.rows);
    const container = el("prof-grid");

    if (!professionals.length) {
      container.innerHTML = '<div class="note">Nenhum profissional encontrado.</div>';
      return;
    }

    let html = "";
    professionals.forEach(p => {
      const s = countByProfessional(state.filtered, p);
      html += `
        <div class="prof-card">
          <div class="prof-name">${p.nome}</div>
          <div class="prof-details">
            <strong>Tipo:</strong> ${tipoLabel(p.tipo)}<br>
            <strong>Atendimentos:</strong> ${s.total}<br>
            <strong>Ativos:</strong> ${s.ativos}<br>
            <strong>Taxa de ativo:</strong> ${s.taxaAtivo.toFixed(1)}%<br>
            <strong>Valor (ativos):</strong> ${formatMoney(s.valor)}
          </div>
        </div>
      `;
    });

    container.innerHTML = html;
  }

  function uniq(arr) {
    return Array.from(new Set(arr));
  }

  function updateProfessionalFilter() {
    const tipo = normalizeHeader(el("profTipo").value);
    const nomeSelect = el("profNome");
    nomeSelect.innerHTML = '<option value="todos">Todos</option>';

    const names = uniq(
      state.rows
        .map(r => (r[tipo] || "").trim())
        .filter(Boolean)
    ).sort((a,b) => a.localeCompare(b));

    names.forEach(n => {
      const opt = document.createElement("option");
      opt.value = n;
      opt.textContent = n;
      nomeSelect.appendChild(opt);
    });
  }

  function updateUfFilter() {
    const ufKey = normalizeHeader("uf");
    const ufSelect = el("ufSelect");
    ufSelect.innerHTML = '<option value="todos">Todas</option>';

    const ufs = uniq(state.rows.map(r => (r[ufKey] || "").trim()).filter(Boolean))
      .sort((a,b) => a.localeCompare(b));

    ufs.forEach(uf => {
      const opt = document.createElement("option");
      opt.value = uf;
      opt.textContent = uf;
      ufSelect.appendChild(opt);
    });
  }

  function updateAll() {
    state.filtered = applyFilters(state.rows);
    updateStats(state.filtered);

    renderRanking(groupRankingByField(state.filtered, normalizeHeader("promotor de marketing")), "ranking-promotor");
    renderRanking(groupRankingByField(state.filtered, normalizeHeader("liner")), "ranking-liner");
    renderRanking(groupRankingByField(state.filtered, normalizeHeader("closer")), "ranking-closer");

    renderProfessionals();
  }

  function setupEventListeners() {
    ["periodoSelect", "statusSelect", "profTipo", "profNome", "ufSelect"].forEach(id => {
      el(id).addEventListener("change", updateAll);
    });

    el("profTipo").addEventListener("change", () => {
      updateProfessionalFilter();
      updateAll();
    });

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        const target = tab.dataset.tab;

        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));

        tab.classList.add("active");
        el(`tab-${target}`).classList.add("active");
      });
    });
  }

  async function init() {
    try {
      el("loading").style.display = "block";
      el("error").style.display = "none";

      const resp = await fetch(CSV_URL, { cache: "no-store" });
      if (!resp.ok) throw new Error(`Erro HTTP: ${resp.status}`);

      const text = await resp.text();
      const raw = parseDelimited(text, ";");
      state.rows = buildObjects(raw);

      updateUfFilter();
      updateProfessionalFilter();
      updateAll();

      // nota do dataset (intervalo de datas)
      const dates = state.rows.map(r => r._date).filter(Boolean).sort((a,b) => a-b);
      if (dates.length) {
        const fmt = (d) => new Intl.DateTimeFormat("pt-BR").format(d);
        const note = el("dataset-note");
        note.style.display = "block";
        note.textContent = `Período detectado no CSV: ${fmt(dates[0])} a ${fmt(dates[dates.length-1])}.`;
      }

      el("loading").style.display = "none";
    } catch (err) {
      console.error(err);
      el("loading").style.display = "none";
      el("error").style.display = "block";
      el("error").textContent = `Erro ao carregar/ler dados.csv.\n\nDetalhes: ${err.message}\n\nDica: confirme se o arquivo "dados.csv" está na mesma pasta do "index.html" no GitHub Pages.`;
    }
  }

  setupEventListeners();
  init();
</script>
</body>
</html>
