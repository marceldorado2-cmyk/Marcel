<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Vendas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            background: linear-gradient(45deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .card {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #06b6d4, #8b5cf6);
            border-radius: 15px 15px 0 0;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(59, 130, 246, 0.2);
        }
        
        .card-value {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card-label {
            font-size: 0.95rem;
            color: #94a3b8;
            font-weight: 500;
        }
        
        .card-percentage {
            font-size: 1.1rem;
            color: #fbbf24;
            margin-left: 10px;
            font-weight: 600;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        label {
            font-size: 0.9rem;
            color: #cbd5e1;
            font-weight: 500;
        }
        
        input, select, button {
            padding: 12px;
            border: 1px solid #475569;
            border-radius: 8px;
            background: #334155;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        button {
            background: linear-gradient(45deg, #3b82f6, #06b6d4);
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-width: 120px;
        }
        
        button:hover {
            background: linear-gradient(45deg, #2563eb, #0891b2);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }
        
        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .chart-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            color: #e2e8f0;
            font-weight: 600;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #374151;
        }
        
        .data-table th {
            background: linear-gradient(45deg, #374151, #4b5563);
            color: #f1f5f9;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        
        .data-table tr:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        
        .data-table td:nth-child(6) {
            font-weight: 600;
        }
        
        .efficiency-good { color: #22c55e; }
        .efficiency-medium { color: #f59e0b; }
        .efficiency-poor { color: #ef4444; }
        
        @media (max-width: 768px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .cards-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard de Vendas</h1>
        
        <!-- Cards de Estatísticas -->
        <div class="cards-grid" id="statsCards">
            <!-- Os cards serão gerados dinamicamente pelo JavaScript -->
        </div>
        
        <!-- Controles -->
        <div class="controls">
            <div class="form-group">
                <label for="startDate">Data Início</label>
                <input type="date" id="startDate">
            </div>
            <div class="form-group">
                <label for="endDate">Data Fim</label>
                <input type="date" id="endDate">
            </div>
            <div class="form-group">
                <label for="vendedor">Vendedor</label>
                <select id="vendedor">
                    <option value="todos">Todos</option>
                </select>
            </div>
            <div class="form-group">
                <label>&nbsp;</label>
                <button onclick="filtrarDados()">Filtrar</button>
            </div>
        </div>
        
        <!-- Gráficos -->
        <div class="charts-container">
            <div class="chart-card">
                <h3 class="chart-title">Evolução Mensal de Vendas</h3>
                <canvas id="salesChart"></canvas>
            </div>
            <div class="chart-card">
                <h3 class="chart-title">Eficiência por Vendedor</h3>
                <canvas id="efficiencyChart"></canvas>
            </div>
        </div>
        
        <!-- Tabela de Dados -->
        <table class="data-table" id="dataTable">
            <thead>
                <tr>
                    <th>Vendedor</th>
                    <th>Casais</th>
                    <th>Cotas Vendidas</th>
                    <th>Cotas Canceladas</th>
                    <th>VGV Total</th>
                    <th>Eficiência</th>
                    <th>NoTour</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Dados serão inseridos aqui -->
            </tbody>
        </table>
    </div>

    <script>
        // Dados de exemplo
        const dadosVendas = [
            {
                vendedor: 'João Silva',
                casais: 320,
                cotasVendidas: 89,
                cotasCanceladas: 12,
                vgvTotal: 7850000,
                noTour: 18
            },
            {
                vendedor: 'Maria Santos',
                casais: 285,
                cotasVendidas: 76,
                cotasCanceladas: 8,
                vgvTotal: 6890000,
                noTour: 15
            },
            {
                vendedor: 'Pedro Oliveira',
                casais: 410,
                cotasVendidas: 125,
                cotasCanceladas: 22,
                vgvTotal: 11200000,
                noTour: 25
            },
            {
                vendedor: 'Ana Costa',
                casais: 195,
                cotasVendidas: 58,
                cotasCanceladas: 6,
                vgvTotal: 5250000,
                noTour: 12
            },
            {
                vendedor: 'Carlos Lima',
                casais: 365,
                cotasVendidas: 98,
                cotasCanceladas: 18,
                vgvTotal: 8890000,
                noTour: 22
            },
            {
                vendedor: 'Lucia Ferreira',
                casais: 275,
                cotasVendidas: 82,
                cotasCanceladas: 9,
                vgvTotal: 7420000,
                noTour: 14
            },
            {
                vendedor: 'Roberto Alves',
                casais: 445,
                cotasVendidas: 135,
                cotasCanceladas: 28,
                vgvTotal: 12100000,
                noTour: 31
            },
            {
                vendedor: 'Fernanda Rocha',
                casais: 155,
                cotasVendidas: 46,
                cotasCanceladas: 5,
                vgvTotal: 4180000,
                noTour: 8
            }
        ];

        // Funções auxiliares
        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(value);
        }

        function calcEficiencia(cotasVendidas, casais) {
            if (!casais) return 0;
            return (cotasVendidas || 0) / casais;
        }

        function calcPercentualNoTour(noTour, casais) {
            const total = noTour + casais;
            if (!total) return 0;
            return (noTour / total) * 100;
        }

        function getEfficiencyClass(efficiency) {
            if (efficiency >= 0.30) return 'efficiency-good';
            if (efficiency >= 0.20) return 'efficiency-medium';
            return 'efficiency-poor';
        }

        function statsFor(dados) {
            const totalCasais = dados.reduce((sum, item) => sum + item.casais, 0);
            const totalCotas = dados.reduce((sum, item) => sum + item.cotasVendidas, 0);
            const totalCanceladas = dados.reduce((sum, item) => sum + item.cotasCanceladas, 0);
            const totalVGV = dados.reduce((sum, item) => sum + item.vgvTotal, 0);
            const totalNoTour = dados.reduce((sum, item) => sum + item.noTour, 0);
            
            const eficiencia = calcEficiencia(totalCotas, totalCasais);
            const mediaCasaisPorDia = totalCasais / 30; // assumindo 30 dias
            const rendaMedia = totalVGV / totalCotas;
            const ticketMedio = totalVGV / totalCotas;
            const percentualNoTour = calcPercentualNoTour(totalNoTour, totalCasais);

            return {
                casais: totalCasais,
                mediaCasaisPorDia: mediaCasaisPorDia,
                cotasVendidas: totalCotas,
                cotasCanceladas: totalCanceladas,
                vgvTotal: totalVGV,
                eficiencia: eficiencia,
                rendaMedia: rendaMedia,
                ticketMedio: ticketMedio,
                noTour: totalNoTour,
                percentualNoTour: percentualNoTour
            };
        }

        function renderCards() {
            const stats = statsFor(dadosVendas);
            const cardsContainer = document.getElementById('statsCards');
            
            const cards = [
                {
                    value: stats.casais.toLocaleString('pt-BR'),
                    label: 'Casais',
                    id: 'casais'
                },
                {
                    value: stats.mediaCasaisPorDia.toFixed(1).replace('.', ','),
                    label: 'Média de Casais por dia',
                    id: 'mediaCasais'
                },
                {
                    value: stats.cotasVendidas.toLocaleString('pt-BR'),
                    label: 'Cotas (vendas totais)',
                    id: 'cotas'
                },
                {
                    value: stats.cotasCanceladas.toLocaleString('pt-BR'),
                    label: 'Cotas canceladas',
                    id: 'canceladas'
                },
                {
                    value: formatCurrency(stats.vgvTotal),
                    label: 'VGV total (Σ col G)',
                    id: 'vgv'
                },
                {
                    value: (stats.eficiencia * 100).toFixed(1).replace('.', ',') + '%',
                    label: 'Eficiência',
                    id: 'eficiencia'
                },
                {
                    value: formatCurrency(stats.rendaMedia),
                    label: 'Renda média',
                    id: 'renda'
                },
                {
                    value: formatCurrency(stats.ticketMedio),
                    label: 'Ticket médio (por cota)',
                    id: 'ticket'
                },
                {
                    value: stats.noTour.toLocaleString('pt-BR'),
                    label: 'NoTour',
                    id: 'notour',
                    percentage: stats.percentualNoTour.toFixed(2).replace('.', ',') + '%'
                }
            ];

            cardsContainer.innerHTML = cards.map(card => `
                <div class="card">
                    <div class="card-value">${card.value}${card.percentage ? `<span class="card-percentage">${card.percentage}</span>` : ''}</div>
                    <div class="card-label">${card.label}</div>
                </div>
            `).join('');
        }

        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            
            tableBody.innerHTML = dadosVendas.map(item => {
                const eficiencia = calcEficiencia(item.cotasVendidas, item.casais);
                const eficiencyClass = getEfficiencyClass(eficiencia);
                
                return `
                    <tr>
                        <td>${item.vendedor}</td>
                        <td>${item.casais.toLocaleString('pt-BR')}</td>
                        <td>${item.cotasVendidas.toLocaleString('pt-BR')}</td>
                        <td>${item.cotasCanceladas.toLocaleString('pt-BR')}</td>
                        <td>${formatCurrency(item.vgvTotal)}</td>
                        <td class="${eficiencyClass}">${(eficiencia * 100).toFixed(1)}%</td>
                        <td>${item.noTour.toLocaleString('pt-BR')}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderCharts() {
            // Gráfico de vendas mensais
            const salesCtx = document.getElementById('salesChart').getContext('2d');
            new Chart(salesCtx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'],
                    datasets: [{
                        label: 'Vendas',
                        data: [65, 59, 80, 81, 56, 55, 40, 89, 95, 102, 87, 93],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#e2e8f0' }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(148, 163, 184, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(148, 163, 184, 0.1)' }
                        }
                    }
                }
            });

            // Gráfico de eficiência por vendedor
            const efficiencyCtx = document.getElementById('efficiencyChart').getContext('2d');
            const vendedores = dadosVendas.map(item => item.vendedor.split(' ')[0]);
            const eficiencias = dadosVendas.map(item => calcEficiencia(item.cotasVendidas, item.casais) * 100);

            new Chart(efficiencyCtx, {
                type: 'bar',
                data: {
                    labels: vendedores,
                    datasets: [{
                        label: 'Eficiência (%)',
                        data: eficiencias,
                        backgroundColor: 'rgba(6, 182, 212, 0.8)',
                        borderColor: '#06b6d4',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#e2e8f0' }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(148, 163, 184, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(148, 163, 184, 0.1)' }
                        }
                    }
                }
            });
        }

        function populateVendedores() {
            const select = document.getElementById('vendedor');
            const vendedores = [...new Set(dadosVendas.map(item => item.vendedor))];
            
            vendedores.forEach(vendedor => {
                const option = document.createElement('option');
                option.value = vendedor;
                option.textContent = vendedor;
                select.appendChild(option);
            });
        }

        function filtrarDados() {
            // Implementar lógica de filtro aqui
            console.log('Filtro aplicado');
            renderCards();
            renderTable();
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            // Definir datas padrão
            const hoje = new Date();
            const umMesAtras = new Date(hoje.getFullYear(), hoje.getMonth() - 1, hoje.getDate());
            
            document.getElementById('startDate').value = umMesAtras.toISOString().split('T')[0];
            document.getElementById('endDate').value = hoje.toISOString().split('T')[0];
            
            populateVendedores();
            renderCards();
            renderTable();
            renderCharts();
        });
    </script>
</body>
</html>
